<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Ex-Grubhub Talent Network</title>

  <meta
    name="description"
    content="Browse the Ex-GH Talent Network. Search impacted alumni by function, location, and role."
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<header class="hero">
  <div class="hero-inner">
    <p class="eyebrow">Ex-GH Talent Network</p>
    <h1>Hire Top Ex-GH Talent</h1>

    <p class="hero-subtext">
      A curated directory of former Grubhub employees actively exploring new opportunities.
    </p>

    <div class="hero-actions">
      <a class="primary-btn" href="#directory-section">Browse Talent</a>
      <a
        class="secondary-btn"
        href="https://docs.google.com/forms/d/e/1FAIpQLSehawGkkedBDJJCGhzKEy33epkB2GeRQ7sB8x8fQ-Uz_kxgAQ/viewform"
        target="_blank"
        rel="noopener noreferrer"
      >
        Join the Directory
      </a>
    </div>
  </div>
</header>

<main>

  <!-- STATS -->
  <section class="stats-section">
    <div class="stat-card stat-card-primary">
      <div id="totalCount" class="stat-number">0</div>
      <div class="stat-label">People Searching</div>
    </div>

    <div class="stat-card">
      <div id="functionCount" class="stat-number">0</div>
      <div class="stat-label">Functions</div>
    </div>
  </section>

  <!-- FUNCTION DASHBOARD -->
  <section class="dashboard-section">
    <div class="section-header">
      <h2>Talent by Function</h2>
    </div>
    <div id="functionDashboard" class="function-dashboard"></div>
  </section>

  <!-- REGION DASHBOARD -->
  <section class="dashboard-section">
    <div class="section-header">
      <h2>Talent by Region</h2>
    </div>
    <div id="locationDashboard" class="function-dashboard"></div>
  </section>

  <!-- FILTERS -->
  <section class="controls-section" id="directory-section">
    <div class="section-header">
      <h2>Browse the Directory</h2>
    </div>

    <div class="controls">

      <input id="search" type="text" placeholder="Search..." />

      <select id="functionFilter">
        <option value="">All Functions</option>
      </select>

      <select id="locationFilter">
        <option value="">All Locations</option>
      </select>

      <button id="clearFilters" class="clear-btn">
        Clear Filters
      </button>

    </div>
  </section>

  <section id="directory"></section>

</main>

<script src="script.js"></script>
</body>
</html>
