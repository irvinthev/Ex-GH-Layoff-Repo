<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ex-GH Talent Directory</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <h1>Hire Top Ex-Grubhub Talent</h1>
      <p class="hero-subtitle">
        Browse open-to-work alumni profiles, filter by function, and connect directly on LinkedIn.
      </p>

      <div class="hero-stats">
        <div class="stat-card">
          <div class="stat-number" id="totalCount">0</div>
          <div class="stat-label">Open to Work</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="functionCount">0</div>
          <div class="stat-label">Functions</div>
        </div>
      </div>
    </div>
  </header>

  <main class="page">
    <section class="controls">
      <div class="search-wrap">
        <label for="search" class="sr-only">Search people</label>
        <input
          type="text"
          id="search"
          placeholder="Search by name, role, function, or keyword..."
        />
      </div>

      <div class="filter-wrap">
        <label for="functionFilter" class="sr-only">Filter by function</label>
        <select id="functionFilter">
          <option value="">All Functions</option>
        </select>
      </div>

      <button id="clearFilters" class="clear-btn" type="button">Clear</button>
    </section>

    <section class="dashboard-section">
      <h2>Function Breakdown</h2>
      <div id="functionDashboard" class="dashboard-list"></div>
    </section>

    <section class="directory-section">
      <div class="section-header">
        <h2>Talent Directory</h2>
        <p id="resultsCount" class="results-count">0 results</p>
      </div>

      <div id="directory" class="directory-grid"></div>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
